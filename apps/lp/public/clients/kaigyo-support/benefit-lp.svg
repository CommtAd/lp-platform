<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lpBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDF1F6"/>
      <stop offset="100%" stop-color="#DCE5F0"/>
    </linearGradient>
    <linearGradient id="phoneBodyLp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#132C52"/>
      <stop offset="100%" stop-color="#081A33"/>
    </linearGradient>
    <linearGradient id="heroPhotoLp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3A63"/>
      <stop offset="100%" stop-color="#081A33"/>
    </linearGradient>
    <linearGradient id="screenGlareLp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="devShadowLp" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#0B2545" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#lpBg)"/>
  <ellipse cx="200" cy="272" rx="90" ry="12" fill="#0B2545" opacity="0.1"/>

  <!-- phone, centered and large -->
  <g transform="translate(146,30)" filter="url(#devShadowLp)">
    <rect x="0" y="0" width="108" height="238" rx="18" fill="url(#phoneBodyLp)"/>
    <rect x="8" y="12" width="92" height="214" rx="6" fill="#FFFFFF"/>

    <!-- hero -->
    <rect x="8" y="12" width="92" height="86" fill="url(#heroPhotoLp)"/>
    <circle cx="70" cy="30" r="20" fill="#3DA5F5" opacity="0.3"/>
    <rect x="20" y="26" width="52" height="8" rx="4" fill="#FFFFFF"/>
    <rect x="20" y="40" width="68" height="6" rx="3" fill="#9FB3CE"/>
    <rect x="20" y="50" width="60" height="6" rx="3" fill="#9FB3CE"/>

    <!-- countdown timer chips -->
    <g>
      <rect x="20" y="66" width="20" height="20" rx="4" fill="#FFFFFF" opacity="0.15"/>
      <rect x="44" y="66" width="20" height="20" rx="4" fill="#FFFFFF" opacity="0.15"/>
      <rect x="68" y="66" width="20" height="20" rx="4" fill="#FFFFFF" opacity="0.15"/>
      <text x="30" y="80" font-family="'Zen Kaku Gothic New','Noto Sans JP',sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">12</text>
      <text x="54" y="80" font-family="'Zen Kaku Gothic New','Noto Sans JP',sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">45</text>
      <text x="78" y="80" font-family="'Zen Kaku Gothic New','Noto Sans JP',sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">09</text>
    </g>

    <!-- CTA button -->
    <rect x="20" y="106" width="68" height="20" rx="10" fill="#FF6A2B"/>
    <rect x="20" y="106" width="68" height="9" rx="10" fill="#FFFFFF" opacity="0.22"/>
    <rect x="32" y="113" width="44" height="6" rx="3" fill="#FFFFFF"/>

    <!-- form card -->
    <rect x="16" y="138" width="76" height="80" rx="6" fill="#EDF1F6" stroke="#DCE3ED" stroke-width="1"/>
    <rect x="24" y="148" width="60" height="6" rx="3" fill="#0B2545"/>
    <rect x="24" y="160" width="60" height="14" rx="4" fill="#FFFFFF" stroke="#C7CDD8" stroke-width="1"/>
    <rect x="24" y="180" width="60" height="14" rx="4" fill="#FFFFFF" stroke="#C7CDD8" stroke-width="1"/>
    <rect x="24" y="200" width="60" height="12" rx="6" fill="#0B2545"/>

    <rect x="8" y="12" width="92" height="214" rx="6" fill="url(#screenGlareLp)"/>
  </g>

  <!-- floating accent numerals -->
  <circle cx="60" cy="60" r="8" fill="#FF6A2B" opacity="0.5"/>
  <circle cx="340" cy="90" r="6" fill="#3DA5F5" opacity="0.55"/>
  <circle cx="60" cy="230" r="5" fill="#3DA5F5" opacity="0.45"/>
  <circle cx="336" cy="230" r="9" fill="#FF6A2B" opacity="0.35"/>
</svg>
