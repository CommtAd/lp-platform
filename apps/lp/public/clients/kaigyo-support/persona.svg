<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="personaBg" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#F9F5EC"/>
      <stop offset="70%" stop-color="#EDE6D6"/>
      <stop offset="100%" stop-color="#E2D9C2"/>
    </radialGradient>
    <radialGradient id="skinGrad" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#FBD3A8"/>
      <stop offset="65%" stop-color="#F0C39B"/>
      <stop offset="100%" stop-color="#DDA97C"/>
    </radialGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A382A"/>
      <stop offset="100%" stop-color="#2A1D15"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3A63"/>
      <stop offset="100%" stop-color="#081A33"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2D6B8"/>
      <stop offset="100%" stop-color="#CBBE9E"/>
    </linearGradient>
    <filter id="pShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0B2545" flood-opacity="0.18"/>
    </filter>
    <filter id="pShadowSm" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0B2545" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#personaBg)"/>

  <!-- faint background task icons (kept away from the four label-chip corners) -->
  <g opacity="0.14" fill="#0B2545">
    <rect x="330" y="180" width="30" height="22" rx="3"/>
    <rect x="336" y="172" width="18" height="10" rx="2"/>
    <circle cx="52" cy="190" r="15"/>
    <rect x="45" y="188" width="14" height="4" fill="#F7F3EA"/>
  </g>

  <!-- desk -->
  <g filter="url(#pShadow)">
    <rect x="60" y="292" width="280" height="14" rx="4" fill="url(#deskGrad)"/>
  </g>
  <rect x="76" y="306" width="14" height="46" fill="#CBBE9E"/>
  <rect x="310" y="306" width="14" height="46" fill="#CBBE9E"/>
  <rect x="76" y="306" width="5" height="46" fill="#B8A97F" opacity="0.6"/>
  <rect x="310" y="306" width="5" height="46" fill="#B8A97F" opacity="0.6"/>

  <!-- scattered papers -->
  <g transform="translate(84,262) rotate(-8)" filter="url(#pShadowSm)">
    <rect width="46" height="32" rx="3" fill="#FFFFFF" stroke="#E3DCC9" stroke-width="1.5"/>
    <line x1="8" y1="10" x2="38" y2="10" stroke="#D8CDB4" stroke-width="2.5"/>
    <line x1="8" y1="18" x2="30" y2="18" stroke="#D8CDB4" stroke-width="2.5"/>
  </g>
  <g transform="translate(280,268) rotate(10)" filter="url(#pShadowSm)">
    <rect width="42" height="30" rx="3" fill="#FFFFFF" stroke="#E3DCC9" stroke-width="1.5"/>
    <line x1="7" y1="9" x2="34" y2="9" stroke="#D8CDB4" stroke-width="2.5"/>
    <line x1="7" y1="17" x2="26" y2="17" stroke="#D8CDB4" stroke-width="2.5"/>
  </g>

  <!-- coffee cup -->
  <g transform="translate(250,270)" filter="url(#pShadowSm)">
    <rect x="0" y="6" width="22" height="20" rx="3" fill="#FFFFFF" stroke="#D8CDB4" stroke-width="2"/>
    <ellipse cx="11" cy="6" rx="11" ry="3" fill="#6B4A32"/>
    <path d="M22 10 h7 a6 6 0 0 1 0 12 h-7" fill="none" stroke="#D8CDB4" stroke-width="2"/>
    <path d="M4 2 q3 -6 0 -10" stroke="#C7CDD8" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M12 2 q3 -6 0 -10" stroke="#C7CDD8" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- laptop -->
  <g transform="translate(150,246)" filter="url(#pShadow)">
    <rect x="0" y="0" width="100" height="62" rx="4" fill="#0B2545"/>
    <rect x="5" y="5" width="90" height="52" rx="2" fill="#EDF1F6"/>
    <path d="M50 5 L20 46" stroke="#C7CDD8" stroke-width="4" opacity="0.5"/>
    <path d="M60 5 L34 50" stroke="#FFFFFF" stroke-width="3" opacity="0.3"/>
    <circle cx="65" cy="30" r="9" fill="none" stroke="#FF6A2B" stroke-width="3"/>
    <path d="M60 30 h10 M65 25 v10" stroke="#FF6A2B" stroke-width="2.5"/>
    <path d="M-6 62 h112 l8 12 h-128 z" fill="#132C52"/>
    <path d="M-6 62 h112 l3 5 h-118 z" fill="#1B3A63"/>
  </g>

  <!-- thought bubble -->
  <g transform="translate(232,96)" filter="url(#pShadowSm)">
    <circle cx="8" cy="70" r="6" fill="#FFFFFF" stroke="#DCD2B8" stroke-width="1.5"/>
    <circle cx="20" cy="56" r="9" fill="#FFFFFF" stroke="#DCD2B8" stroke-width="1.5"/>
    <ellipse cx="46" cy="26" rx="46" ry="32" fill="#FFFFFF" stroke="#DCD2B8" stroke-width="1.5"/>
    <ellipse cx="34" cy="12" rx="18" ry="8" fill="#FFFFFF" opacity="0.7"/>
    <text x="30" y="34" font-family="'Zen Kaku Gothic New','Noto Sans JP',sans-serif" font-size="26" font-weight="700" fill="#0B2545">?</text>
    <text x="56" y="34" font-family="'Zen Kaku Gothic New','Noto Sans JP',sans-serif" font-size="26" font-weight="700" fill="#FF6A2B">!</text>
  </g>

  <!-- gym owner character: slumped over desk, head on hand -->
  <g transform="translate(130,150)" filter="url(#pShadow)">
    <!-- body / cardigan with fold shading -->
    <path d="M20 150 q-4 -70 40 -78 q46 -8 58 40 q6 26 -4 44 z" fill="url(#shirtGrad)"/>
    <path d="M28 148 q0 -50 26 -66" stroke="#2C4F7C" stroke-width="4" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M92 96 q10 24 6 50" stroke="#000000" stroke-width="5" fill="none" opacity="0.15" stroke-linecap="round"/>
    <!-- arm resting on desk -->
    <path d="M96 96 q26 4 34 26" stroke="url(#shirtGrad)" stroke-width="16" stroke-linecap="round" fill="none"/>
    <!-- head, tilted, resting on hand -->
    <g transform="translate(94,60) rotate(8)">
      <ellipse cx="0" cy="0" rx="30" ry="28" fill="url(#skinGrad)"/>
      <ellipse cx="-10" cy="10" rx="16" ry="12" fill="#C88A5E" opacity="0.25"/>
      <!-- hair -->
      <path d="M-30 -4 q-2 -30 30 -32 q32 -2 30 30 q-6 -14 -30 -14 q-24 0 -30 16 z" fill="url(#hairGrad)"/>
      <path d="M-26 -8 q4 -18 24 -20" stroke="#5C4632" stroke-width="2" fill="none" opacity="0.6"/>
      <!-- tired eyes -->
      <path d="M-14 2 q6 6 12 0" stroke="#3B2B22" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <path d="M4 2 q6 6 12 0" stroke="#3B2B22" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <!-- small frown -->
      <path d="M-8 16 q8 -6 16 0" stroke="#B9855A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <!-- sweat drop -->
      <path d="M28 -10 q6 8 0 14 q-6 -6 0 -14 z" fill="#3DA5F5" opacity="0.75"/>
      <ellipse cx="26" cy="-4" rx="1.6" ry="2.4" fill="#FFFFFF" opacity="0.6"/>
    </g>
    <!-- supporting hand -->
    <circle cx="120" cy="94" r="11" fill="url(#skinGrad)"/>
  </g>
</svg>
