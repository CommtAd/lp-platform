<svg width="400" height="420" viewBox="0 0 400 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="closeGlow" cx="50%" cy="34%" r="65%">
      <stop offset="0%" stop-color="#3F6493"/>
      <stop offset="55%" stop-color="#1B3A63"/>
      <stop offset="100%" stop-color="#0A1E3B"/>
    </radialGradient>
    <radialGradient id="rimGlow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#FFA968" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FFA968" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trainerShirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9459"/>
      <stop offset="100%" stop-color="#E8590F"/>
    </linearGradient>
    <linearGradient id="trainerSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBD3A8"/>
      <stop offset="100%" stop-color="#DDA97C"/>
    </linearGradient>
    <linearGradient id="trainerPants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3A63"/>
      <stop offset="100%" stop-color="#081A33"/>
    </linearGradient>
    <linearGradient id="floorGradClose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#193759"/>
      <stop offset="100%" stop-color="#0A1E3B"/>
    </linearGradient>
    <filter id="figShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="400" height="420" fill="url(#closeGlow)"/>

  <!-- floor with reflection gradient -->
  <rect x="0" y="330" width="400" height="90" fill="url(#floorGradClose)"/>
  <g stroke="#28486F" stroke-width="1.5" opacity="0.7">
    <line x1="0" y1="350" x2="400" y2="350"/>
    <line x1="0" y1="374" x2="400" y2="374"/>
    <line x1="0" y1="398" x2="400" y2="398"/>
  </g>
  <ellipse cx="200" cy="332" rx="180" ry="16" fill="#000000" opacity="0.2"/>

  <!-- background figures training -->
  <g fill="#2C4F7C" filter="url(#figShadow)">
    <!-- figure with dumbbell, left -->
    <circle cx="66" cy="228" r="14"/>
    <rect x="54" y="242" width="24" height="52" rx="10"/>
    <rect x="30" y="252" width="20" height="9" rx="4.5"/>
    <circle cx="28" cy="256" r="7"/>
    <circle cx="52" cy="256" r="7"/>
    <rect x="58" y="294" width="10" height="30" rx="4"/>
    <rect x="70" y="294" width="10" height="30" rx="4"/>

    <!-- figure stretching, right -->
    <circle cx="336" cy="222" r="14"/>
    <rect x="322" y="236" width="26" height="50" rx="12"/>
    <path d="M348 246 q26 10 20 34" stroke="#2C4F7C" stroke-width="12" fill="none" stroke-linecap="round"/>
    <rect x="326" y="286" width="10" height="34" rx="4"/>
    <rect x="340" y="286" width="10" height="34" rx="4"/>
  </g>
  <path d="M52 200 q14 -6 24 0" stroke="#4A6E9C" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M322 194 q14 -6 24 0" stroke="#4A6E9C" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- rim light behind trainer -->
  <circle cx="200" cy="230" r="150" fill="url(#rimGlow)"/>

  <!-- confident trainer, foreground center -->
  <g transform="translate(200,300)" filter="url(#figShadow)">
    <!-- legs -->
    <rect x="-30" y="60" width="22" height="70" rx="10" fill="url(#trainerPants)"/>
    <rect x="8" y="60" width="22" height="70" rx="10" fill="url(#trainerPants)"/>
    <rect x="-30" y="60" width="8" height="70" rx="4" fill="#2C4F7C" opacity="0.5"/>
    <rect x="8" y="60" width="8" height="70" rx="4" fill="#2C4F7C" opacity="0.5"/>
    <rect x="-34" y="126" width="30" height="14" rx="6" fill="#0A1E3B"/>
    <rect x="4" y="126" width="30" height="14" rx="6" fill="#0A1E3B"/>

    <!-- torso -->
    <path d="M-38 -20 q38 -22 76 0 l6 88 q-44 18 -88 0 z" fill="url(#trainerShirt)"/>
    <path d="M-38 -20 q38 -22 76 0 l2 30 q-40 14 -80 0 z" fill="#FFFFFF" opacity="0.14"/>
    <path d="M20 -12 q10 46 4 84" stroke="#B3430A" stroke-width="4" fill="none" opacity="0.35" stroke-linecap="round"/>
    <!-- crossed arms -->
    <path d="M-40 -6 q-22 14 -10 40 q18 8 30 -6" fill="url(#trainerSkin)"/>
    <path d="M40 -6 q22 14 10 40 q-18 8 -30 -6" fill="url(#trainerSkin)"/>

    <!-- neck + head -->
    <rect x="-9" y="-46" width="18" height="16" rx="6" fill="url(#trainerSkin)"/>
    <circle cx="0" cy="-64" r="28" fill="url(#trainerSkin)"/>
    <ellipse cx="-10" cy="-72" rx="12" ry="8" fill="#FFFFFF" opacity="0.2"/>
    <path d="M-28 -70 q4 -26 28 -26 q28 0 28 24 q-10 -12 -28 -12 q-18 0 -28 14 z" fill="#241811"/>
    <!-- confident smile -->
    <path d="M-11 -58 q11 12 22 0" stroke="#B9855A" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <circle cx="-9" cy="-66" r="2.4" fill="#241811"/>
    <circle cx="9" cy="-66" r="2.4" fill="#241811"/>

    <!-- thumbs up hand -->
    <g transform="translate(46,20)">
      <circle r="10" fill="url(#trainerSkin)"/>
      <rect x="-3" y="-18" width="7" height="14" rx="3.5" fill="url(#trainerSkin)"/>
    </g>
  </g>

  <!-- sparkle accents -->
  <circle cx="90" cy="80" r="4" fill="#FF8A50" opacity="0.7"/>
  <circle cx="330" cy="100" r="5" fill="#3DA5F5" opacity="0.6"/>
  <circle cx="60" cy="150" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="352" cy="170" r="3.5" fill="#FFFFFF" opacity="0.45"/>
</svg>
