<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4EC"/>
      <stop offset="100%" stop-color="#E9E1CE"/>
    </linearGradient>
    <linearGradient id="heroWindow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CFE8FB"/>
      <stop offset="60%" stop-color="#8FC6EE"/>
      <stop offset="100%" stop-color="#5FA9DE"/>
    </linearGradient>
    <linearGradient id="heroCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF1F6"/>
    </linearGradient>
    <linearGradient id="metalV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B3A63"/>
      <stop offset="45%" stop-color="#0B2545"/>
      <stop offset="100%" stop-color="#081A33"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6DCC3"/>
      <stop offset="100%" stop-color="#D2C5A4"/>
    </linearGradient>
    <linearGradient id="screenGlare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0B2545" flood-opacity="0.28"/>
    </filter>
    <filter id="tinyShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0B2545" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#heroBg)"/>

  <!-- floor with soft depth -->
  <rect x="0" y="228" width="400" height="72" fill="url(#floorGrad)"/>
  <g stroke="#C7B896" stroke-width="1.2" opacity="0.7">
    <line x1="0" y1="246" x2="400" y2="246"/>
    <line x1="0" y1="264" x2="400" y2="264"/>
    <line x1="0" y1="283" x2="400" y2="283"/>
  </g>
  <ellipse cx="150" cy="230" rx="150" ry="10" fill="#000000" opacity="0.06"/>

  <!-- window with glass highlight -->
  <rect x="24" y="34" width="94" height="120" rx="6" fill="url(#heroWindow)"/>
  <path d="M28 40 L60 40 L34 148 L28 148 Z" fill="#FFFFFF" opacity="0.25"/>
  <path d="M68 40 L78 40 L48 148 L40 148 Z" fill="#FFFFFF" opacity="0.16"/>
  <rect x="24" y="34" width="94" height="120" rx="6" fill="none" stroke="#FFFFFF" stroke-width="4"/>
  <line x1="71" y1="34" x2="71" y2="154" stroke="#FFFFFF" stroke-width="4"/>
  <line x1="24" y1="94" x2="118" y2="94" stroke="#FFFFFF" stroke-width="4"/>

  <!-- gym rack, metallic shaded -->
  <g filter="url(#tinyShadow)">
    <rect x="18" y="176" width="118" height="10" rx="3" fill="url(#metalV)"/>
    <rect x="26" y="152" width="14" height="26" rx="3" fill="url(#metalV)"/>
    <rect x="52" y="146" width="14" height="32" rx="3" fill="url(#metalV)"/>
    <rect x="78" y="152" width="14" height="26" rx="3" fill="url(#metalV)"/>
    <rect x="104" y="158" width="14" height="20" rx="3" fill="url(#metalV)"/>
    <rect x="27" y="152" width="3" height="26" fill="#4B6E9C" opacity="0.6"/>
    <rect x="53" y="146" width="3" height="32" fill="#4B6E9C" opacity="0.6"/>
  </g>
  <!-- kettlebell -->
  <g filter="url(#tinyShadow)">
    <circle cx="150" cy="196" r="16" fill="url(#metalV)"/>
    <circle cx="145" cy="190" r="4.5" fill="#4B6E9C" opacity="0.55"/>
    <path d="M142 184 q8 -10 16 0" stroke="#0B2545" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- soft accent dots -->
  <circle cx="340" cy="46" r="7" fill="#FF6A2B" opacity="0.55"/>
  <circle cx="362" cy="70" r="4" fill="#3DA5F5" opacity="0.6"/>
  <circle cx="30" cy="210" r="5" fill="#3DA5F5" opacity="0.4"/>

  <!-- floating browser/UI card -->
  <g transform="translate(150,60) rotate(-4)" filter="url(#softShadow)">
    <rect x="0" y="0" width="210" height="146" rx="14" fill="url(#heroCard)" stroke="#E3E7EE" stroke-width="1.5"/>
    <rect x="0" y="0" width="210" height="26" rx="14" fill="#0B2545"/>
    <rect x="0" y="14" width="210" height="12" fill="#0B2545"/>
    <circle cx="16" cy="13" r="3.4" fill="#FF6A2B"/>
    <circle cx="28" cy="13" r="3.4" fill="#F5C453"/>
    <circle cx="40" cy="13" r="3.4" fill="#3DA5F5"/>

    <rect x="16" y="40" width="120" height="10" rx="3" fill="#0B2545"/>
    <rect x="16" y="56" width="170" height="6" rx="3" fill="#C7CDD8"/>
    <rect x="16" y="68" width="150" height="6" rx="3" fill="#C7CDD8"/>

    <rect x="16" y="88" width="88" height="26" rx="13" fill="#FF6A2B"/>
    <rect x="16" y="88" width="88" height="12" rx="13" fill="#FFFFFF" opacity="0.18"/>
    <rect x="30" y="97" width="60" height="8" rx="4" fill="#FFFFFF"/>

    <rect x="16" y="126" width="46" height="8" rx="4" fill="#3DA5F5" opacity="0.5"/>
    <rect x="68" y="126" width="46" height="8" rx="4" fill="#3DA5F5" opacity="0.3"/>

    <rect x="0" y="0" width="210" height="146" rx="14" fill="url(#screenGlare)"/>
  </g>

  <!-- phone card overlapping bottom-left of browser -->
  <g transform="translate(80,150) rotate(3)" filter="url(#softShadow)">
    <rect x="0" y="0" width="76" height="126" rx="14" fill="url(#heroCard)" stroke="#E3E7EE" stroke-width="1.5"/>
    <rect x="8" y="10" width="60" height="72" rx="6" fill="#EDF1F6"/>
    <rect x="14" y="18" width="48" height="8" rx="3" fill="#0B2545"/>
    <rect x="14" y="32" width="48" height="5" rx="2.5" fill="#C7CDD8"/>
    <rect x="14" y="42" width="36" height="5" rx="2.5" fill="#C7CDD8"/>
    <rect x="14" y="60" width="48" height="16" rx="8" fill="#FF6A2B"/>
    <rect x="14" y="60" width="48" height="7" rx="8" fill="#FFFFFF" opacity="0.2"/>
    <circle cx="38" cy="100" r="6" fill="#0B2545" opacity="0.15"/>
    <rect x="0" y="0" width="76" height="126" rx="14" fill="url(#screenGlare)"/>
  </g>
</svg>
