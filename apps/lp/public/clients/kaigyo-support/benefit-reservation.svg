<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="resBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDF1F6"/>
      <stop offset="100%" stop-color="#DCE5F0"/>
    </linearGradient>
    <linearGradient id="tabletBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#132C52"/>
      <stop offset="100%" stop-color="#081A33"/>
    </linearGradient>
    <linearGradient id="cellSelected" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A50"/>
      <stop offset="100%" stop-color="#FF6A2B"/>
    </linearGradient>
    <linearGradient id="cellBooked" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5FBBF7"/>
      <stop offset="100%" stop-color="#3DA5F5"/>
    </linearGradient>
    <linearGradient id="screenGlareRes" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="devShadowRes" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#0B2545" flood-opacity="0.3"/>
    </filter>
    <filter id="cellShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0B2545" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#resBg)"/>
  <ellipse cx="200" cy="266" rx="160" ry="14" fill="#0B2545" opacity="0.08"/>

  <!-- tablet -->
  <g transform="translate(56,44)" filter="url(#devShadowRes)">
    <rect x="0" y="0" width="288" height="212" rx="14" fill="url(#tabletBody)"/>
    <rect x="10" y="10" width="268" height="192" rx="4" fill="#FFFFFF"/>

    <!-- header -->
    <rect x="10" y="10" width="268" height="30" fill="#0B2545"/>
    <rect x="22" y="20" width="70" height="9" rx="3" fill="#FFFFFF"/>
    <rect x="230" y="18" width="44" height="14" rx="7" fill="#FF6A2B"/>
    <rect x="230" y="18" width="44" height="6" rx="7" fill="#FFFFFF" opacity="0.25"/>

    <!-- calendar grid -->
    <g>
      <!-- weekday row -->
      <g font-family="'Zen Kaku Gothic New','Noto Sans JP',sans-serif" font-size="8" fill="#9FB3CE" text-anchor="middle">
        <text x="47" y="54">月</text><text x="85" y="54">火</text><text x="123" y="54">水</text>
        <text x="161" y="54">木</text><text x="199" y="54">金</text><text x="237" y="54">土</text><text x="266" y="54">日</text>
      </g>
      <!-- grid cells row 1 -->
      <g fill="#EDF1F6">
        <rect x="30" y="62" width="34" height="26" rx="4"/>
        <rect x="68" y="62" width="34" height="26" rx="4"/>
        <rect x="106" y="62" width="34" height="26" rx="4"/>
        <rect x="144" y="62" width="34" height="26" rx="4"/>
        <rect x="182" y="62" width="34" height="26" rx="4"/>
        <rect x="220" y="62" width="34" height="26" rx="4"/>
        <rect x="250" y="62" width="30" height="26" rx="4"/>
      </g>
      <!-- selected/booked highlight -->
      <g filter="url(#cellShadow)">
        <rect x="106" y="62" width="34" height="26" rx="4" fill="url(#cellSelected)"/>
        <rect x="182" y="62" width="34" height="26" rx="4" fill="url(#cellBooked)" opacity="0.9"/>
      </g>
      <!-- grid cells row 2 -->
      <g fill="#EDF1F6">
        <rect x="30" y="94" width="34" height="26" rx="4"/>
        <rect x="68" y="94" width="34" height="26" rx="4"/>
        <rect x="106" y="94" width="34" height="26" rx="4"/>
        <rect x="144" y="94" width="34" height="26" rx="4"/>
        <rect x="182" y="94" width="34" height="26" rx="4"/>
        <rect x="220" y="94" width="34" height="26" rx="4"/>
        <rect x="250" y="94" width="30" height="26" rx="4"/>
      </g>
      <rect x="144" y="94" width="34" height="26" rx="4" fill="url(#cellSelected)" opacity="0.8" filter="url(#cellShadow)"/>
    </g>

    <!-- customer list panel -->
    <rect x="30" y="132" width="250" height="16" rx="4" fill="#EDF1F6"/>
    <circle cx="40" cy="140" r="5" fill="#3DA5F5"/>
    <rect x="52" y="137" width="90" height="6" rx="3" fill="#0B2545"/>
    <rect x="230" y="136" width="40" height="9" rx="4.5" fill="#FF6A2B"/>

    <rect x="30" y="154" width="250" height="16" rx="4" fill="#EDF1F6"/>
    <circle cx="40" cy="162" r="5" fill="#FF6A2B"/>
    <rect x="52" y="159" width="70" height="6" rx="3" fill="#0B2545"/>
    <rect x="230" y="158" width="40" height="9" rx="4.5" fill="#3DA5F5"/>

    <rect x="30" y="176" width="250" height="16" rx="4" fill="#EDF1F6"/>
    <circle cx="40" cy="184" r="5" fill="#3DA5F5"/>
    <rect x="52" y="181" width="100" height="6" rx="3" fill="#0B2545"/>
    <rect x="230" y="180" width="40" height="9" rx="4.5" fill="#FF6A2B"/>

    <rect x="10" y="10" width="268" height="192" rx="4" fill="url(#screenGlareRes)"/>
  </g>

  <circle cx="352" cy="60" r="7" fill="#FF6A2B" opacity="0.5"/>
  <circle cx="34" cy="240" r="5" fill="#3DA5F5" opacity="0.55"/>
</svg>
